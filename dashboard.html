<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Sublytics - Dashboard</title>

    <link rel="stylesheet" href="dashboard.css" />
</head>

<body>

    <!-- ==================== HEADER ==================== -->

    <header class="app-header">

        <h1>Sublytics</h1>
        <button class="btn-menu material-symbols-outlined" aria-label="Abrir menú principal" aria-expanded="false"
            aria-controls="main-navigation">menu</button>

        <nav id="main-navigation" class="main-nav" hidden>
            <ul>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/subscriptions">Suscripciones</a></li>
                <li><a href="/reports">Informes</a></li>
                <li><a href="/settings">Configuración</a></li>
            </ul>
        </nav>

    </header>

    <!-- ==================== MAIN ==================== -->

    <main class="app">

        <!-- HERO -->
        <section class="hero">
            <div class="hero-stat">
                <p class="hero-value">694,04€</p>
                <p class="hero-label">Media anual</p>
            </div>
            <div class="hero-stat">
                <p class="hero-value">10</p>
                <p class="hero-label">Suscripciones</p>
            </div>
        </section>

        <!-- CARD -->
        <article class="card">
            <a class="card-link" href="/subscriptions/google-one.html">
                <img class="card-image" src="assets/Google_One_logo.svg" alt="Suscripción a Nombre del producto" />

                <div class="card-content">
                    <div class="card-info">
                        <h2 class="card-title">Nombre del producto</h2>
                        <p class="card-category">Categoría</p>
                    </div>

                    <div class="card-pricing">
                        <p class="card-price">Precio</p>
                        <p class="card-period">Temporalidad</p>
                    </div>
                </div>
            </a>
        </article>

    </main>

    <!-- ==================== FOOTER ==================== -->

    <footer>
        <p class="footer-brand">Sublytics &copy 2026</p>

        <a class="footer-link" href="https://github.com/Jaldekoa/sublytics" target="_blank"
            aria-label="Ver repositorio de Sublytics en GitHub" rel="noopener noreferrer">

            <svg class="github-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-brand-github">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path
                    d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" />
            </svg>
        </a>

    </footer>

</body>

</html>
