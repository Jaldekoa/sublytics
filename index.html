<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />

    <title>Sublytics - Entrar o Registrarse</title>

</head>

<body>

    <main class="app">

        <section class="app__description">
            <p class="description__name"><img class="description__image" src="assets/favicon.webp">
                <span class="name__lytics">ublytics</span>
            </p>

            <p class="description__explain">Un gestor de suscripciones para tus servicios web. </p>
            <p class="description__explain">Controla tus gastos y recibe alertas de renovaciones próximas.</p>
        </section>

        <section class="app_login">
            <form class="login__form" action="index.html" method="get">

                <label class="label__user" for="user">Usuario</label>
                <input class="input__user" type="text" id="user" value="user" required>

                <label class="label_password" for="password">Contraseña</label>
                <input class="input__password" type="password" id="password" value="password" required>

                <button class="form__button" type="submit" formmethod="get">Entrar</button>

            </form>
        </section>

    </main>

</body>

</html>
